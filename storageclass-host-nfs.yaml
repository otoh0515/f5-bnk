apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: nfs
  annotations:
    storageclass.kubernetes.io/is-default-class: "true"  # Sets this as default for PVCs without a storageClass
provisioner: nfs.csi.k8s.io
parameters:
  server: 10.1.1.5        # Replace with your NFS server IP
  share: /mnt/nfs         # Exported path on the NFS server
reclaimPolicy: Delete     # Deletes underlying NFS dir on PVC delete (if supported)
volumeBindingMode: Immediate
allowVolumeExpansion: true  # Enables `kubectl edit pvc` to grow the volume
mountOptions:
  - hard
  - nfsvers=4.0           # Ensures NFSv4 is used
