apiVersion: v1
kind: ConfigMap
metadata:
  annotations: {}
  name: nginx-conf-cm
  namespace: red
data:
  nginx.conf: |
    user nginx;
    worker_processes  1;
    events {
      worker_connections 10240;
    }
    http {
      server {
        listen 8080;
        add_header Access-Control-Allow-Origin *;
        location = / {
          default_type text/plain;
          return 200 "Red App 1 $server_name\n$remote_addr:$remote_port --> $server_addr:$server_port\nHost: $http_host\nX-Forwarded-For: $http_x_forwarded_for\n";
        }
        location / {
          proxy_pass http://10.1.1.4/;
          proxy_set_header Host $http_host;
          proxy_set_header X-Real-IP $remote_addr:remote_port;
          proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }
      }
    }
