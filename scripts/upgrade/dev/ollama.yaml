apiVersion: apps/v1
kind: Deployment
metadata:
  name: ollama
  namespace: ollama
spec:
  replicas: 2
  selector:
    matchLabels:
      app: ollama
  template:
    metadata:
      labels:
        app: ollama
    spec:
      # Force scheduling only on nodes 2 and 3
      nodeSelector:
        ollama-node: "true"

      containers:
        - name: ollama
          image: ollama/ollama:latest
          ports:
            - containerPort: 11434
              name: http

          # Uncomment this section to use persistent storage
          #volumeMounts:
          #  - name: ollama-data
          #    mountPath: /root/.ollama

          command: ["/bin/bash", "-c"]
          args:
            - |
              ollama serve &
              sleep 5
              ollama pull tinyllama
              wait

      # Uncomment this section to enable PVC storage
      #volumes:
      #  - name: ollama-data
      #    persistentVolumeClaim:
      #      claimName: ollama-pvc
#---
#apiVersion: v1
#kind: PersistentVolumeClaim
#metadata:
#  name: ollama-pvc
#  namespace: ollama
#spec:
#  accessModes:
#    - ReadWriteOnce
#  resources:
#    requests:
#      storage: 10Gi
#  storageClassName: standard
---
apiVersion: v1
kind: Service
metadata:
  name: ollama-svc
  namespace: ollama
spec:
  clusterIP: None
  selector:
    app: ollama
  ports:
    - name: http
      port: 11434
---
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: my-ollama-gateway
  namespace: ollama
spec:
  addresses:
  - type: "IPAddress"
    value: 172.16.201.102
  gatewayClassName: f5-gateway-class
  listeners:
  - name: http-listener
    protocol: HTTP
    port: 80
    allowedRoutes:
      kinds:
      - kind: HTTPRoute
        group: gateway.networking.k8s.io
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: ollama-app
  namespace: ollama
spec:
  parentRefs:
  - name: my-ollama-gateway
    sectionName: http-listener
  rules:
  - matches:
    - headers:
      - name: "Host"
        value: "llm.secure-demo.net"
  - backendRefs:
    - name: ollama-svc
      namespace: ollama
      port: 80
