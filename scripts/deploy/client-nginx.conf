server {
	listen 80;
	listen [::]:80;
        add_header Access-Control-Allow-Origin *;
        location / {
          allow 10.1.1.6;
          default_type text/plain;
          return 200 "DEMO-UI is configured\n\n";
        }
}
server {
	listen 80 default_server;
	listen [::]:80 default_server;
        add_header Access-Control-Allow-Origin *;
        location / {
          deny all;
          default_type text/plain;
          return 200 "External App $server_name\n$remote_addr:$remote_port-->$server_addr:$server_port\n\n";
        }
        location /flag {
          set $variable 'fdfwc';
          return 302 http://10.2.30.101:8080/$variable;
        }
}

server {
	server_name red.demo.net;
        listen 80;
        add_header Access-Control-Allow-Origin *;
        location ~ ^/10\.1\.20\.201-\d+/10\.\d+\.\d+\.\d+-\d+$ {
          set $variable 'xikhq';
          return 302 http://127.0.0.1:8080/$variable;
        }
        location ~ ^/10\.1\.20\.202-\d+/10\.\d+\.\d+\.\d+-\d+$ {
          set $variable 'bbwzi';
          return 302 http://127.0.0.1:8080/$variable;
        }
        location / {
          default_type text/plain;
          return 200 "\nunsuccessful\n\n";
        }
}

